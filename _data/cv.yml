cv:
  name: Luigi Catello
  headline: PhD student
  location: Napoli, Italy
  email: l.catello@ssmeridionale.it
  photo:
  phone:
  website: https://luigicatello.it
  social_networks:
    - network: GitHub
      username: louis1642
  custom_connections:
  sections:
    About me:
      - "I am a young engineer and PhD student based in Napoli. I work on complex, multi-agent systems, learning-based solutions, and cross-scale operators."
      - "I am driven by curiosity and enthusiasm for science, technology, and the endless possibility they offer."
    Education:
      - institution: Scuola Superiore Meridionale
        area: Modeling and Engineering Risk and Complexity
        degree: PhD
        date:
        start_date: 2025-10
        end_date: present
        location: Napoli, Italy
        summary:
        highlights:
          - "Project title: Certified Cross-Scale Bridges for Multiscale Control of Large-Scale Multiagent Systems via Physics-Informed Learning and Neural Operators"
          - "Supervisors: Prof. Mario di Bernardo, Prof. Costantinos Siettos, Davide Salzano (PhD)"
          - "Keywords: multi-scale control, multi-agent systems, micro-macro bridges, physics-informed learning, mean-field control"

      - institution: Università degli Studi di Napoli Federico II
        area: Automation and Robotics Engineering
        degree: MS
        date:
        start_date: 2022-10
        end_date: 2025-10
        location: Napoli, Italy
        summary:
        highlights:
          - "Thesis: Learning-based multiscale shepherding control for multi-agent complex systems"
          - "Supervisors: Prof. Mario di Bernardo, Davide Salzano (PhD), Italo Napolitano"
          - "Final grade: 110/110 cum laude"
          - "GPA: 29.50/30"
          - |
            **Main themes covered:**
            - Optimal Control Theory
            - Nonlinear Control
            - Operations Research
            - Optimization
            - Robotics (Modelling and Programming)
      - institution: Tampere University
        area: Engineering
        degree: Erasmus+
        date:
        start_date: 2022-01
        end_date: 2022-05
        location: Tampere, Finland
        summary:
        highlights:
          - |
            **Main themes covered:**
            - Computer Vision
            - Distributed and Intelligent Automation Systems
            - Microcontrollers
      - institution: Università degli Studi di Napoli Federico II
        area: Automation Engineering
        degree: BS
        date:
        start_date: 2019-09
        end_date: 2022-10
        location: Napoli, Italy
        summary:
        highlights:
          - "Thesis: Neural Networks for Instance Segmentation"
          - "Supervisor: Prof. Giovanni Poggi"
          - "Final grade: 110/110 cum laude"
          - "GPA: 29.24/30"
          - |
            **Main themes covered:**
            - Fundamentals (calculus, physics, linear algebra, etc.)
            - Electronics
            - System Theory
            - Control Theory
    Experience:
      - company: Freelancer
        position: Backend developer
        date:
        start_date: 2021-01
        end_date: present
        location: Napoli, Italy
        summary:
        highlights:
          - Backend developer for websites with databases
          - "Main langages used: PHP, MySQL"
    Publications:
      - title: "Sparse shepherding control of large-scale multi-agent systems via Reinforcement Learning"
        authors:
          - "*Luigi Catello*"
          - Italo Napolitano
          - Davide Salzano
          - Mario di Bernardo
        summary:
        doi: 10.48550/arXiv.2511.21304
        url:
        journal: Proceedings of ECC2026
        date: 2026
    Skills:
      - label: Languages
        details: Italian (mother tongue), English (C1 level)
      - label: Digital skills
        details: MATLAB and Simulink, Python, C++, PHP and MySQL, Git and version control, Virtual Machines, VBA, Windows/MacOS/Ubuntu, Latex, ...
